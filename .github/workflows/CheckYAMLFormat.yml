name: Check YAML Format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  yml-format:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRETTIER_VERSION: "3.3.3"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect target YAML files
        id: files
        env:
          BEFORE_SHA: ${{ github.event.before }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="$PULL_REQUEST_BASE_SHA"
          else
            BASE_SHA="${BEFORE_SHA:-}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git hash-object -t tree /dev/null)"
            fi
          fi

          mapfile -t CONFIG_FILES < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA" -- \
              .prettierignore \
              .prettierrc \
              .prettierrc.json \
              .prettierrc.yaml \
              .prettierrc.yml \
              prettier.config.js \
              .github/workflows/CheckYAMLFormat.yml
          )

          if [[ ${#CONFIG_FILES[@]} -gt 0 ]]; then
            echo "YAML check configuration changed; checking all YAML files."
            git ls-files '*.yaml' '*.yml' > /tmp/yaml_files.txt
          else
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA" -- \
              '*.yaml' '*.yml' > /tmp/yaml_files.txt
          fi

          if [[ ! -s /tmp/yaml_files.txt ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No YAML files changed."
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "Target YAML files:"
          cat /tmp/yaml_files.txt

      - name: Set up Node.js
        if: steps.files.outputs.has_files == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Check YAML formatting
        if: steps.files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < /tmp/yaml_files.txt
          npx --yes "prettier@${PRETTIER_VERSION}" --version
          npx --yes "prettier@${PRETTIER_VERSION}" --check "${FILES[@]}"
