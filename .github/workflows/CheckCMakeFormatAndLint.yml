name: Check CMake Format and Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  cmake-format-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CMAKELANG_VERSION: "0.6.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect target CMake listfiles
        id: files
        env:
          BEFORE_SHA: ${{ github.event.before }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE_SHA="$PULL_REQUEST_BASE_SHA"
          else
            BASE_SHA="${BEFORE_SHA:-}"
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
              BASE_SHA="$(git hash-object -t tree /dev/null)"
            fi
          fi

          mapfile -t CONFIG_FILES < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA" -- \
              .cmake-format.yaml \
              .cmakelintrc \
              .github/workflows/CheckCMakeFormatAndLint.yml
          )
          mapfile -t CHANGED_LISTFILES < <(
            git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$GITHUB_SHA" -- \
              ':(glob)**/CMakeLists.txt' \
              ':(glob)**/*.cmake' \
              ':(glob)**/*.cmake.in'
          )

          if [[ ${#CONFIG_FILES[@]} -gt 0 ]]; then
            echo "CMake check configuration changed; checking all CMake listfiles."
            git ls-files \
              ':(glob)**/CMakeLists.txt' \
              ':(glob)**/*.cmake' \
              ':(glob)**/*.cmake.in' \
              > /tmp/cmake_files.txt
          elif [[ ${#CHANGED_LISTFILES[@]} -gt 0 ]]; then
            printf '%s\n' "${CHANGED_LISTFILES[@]}" > /tmp/cmake_files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No CMake listfiles changed."
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "Target files:"
          cat /tmp/cmake_files.txt

      - name: Set up Python
        if: steps.files.outputs.has_files == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install cmakelang
        if: steps.files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "cmakelang[YAML]==${CMAKELANG_VERSION}"
          cmake-format --version
          cmake-lint --version

      - name: Check CMake formatting
        if: steps.files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < /tmp/cmake_files.txt
          cmake-format --check "${FILES[@]}"

      - name: Lint CMake listfiles
        if: steps.files.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < /tmp/cmake_files.txt
          cmake-lint --suppress-decorations -c .cmakelintrc -- "${FILES[@]}"
