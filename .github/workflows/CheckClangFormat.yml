name: Check Clang Format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install clang-format 22.1.3 (apt.llvm.org)
        shell: bash
        env:
          LLVM_MAJOR: "22"
          CLANG_FORMAT_VERSION: "22.1.3"
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          # Add LLVM repo and metadata for the pinned clang-format major.
          wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          sudo bash /tmp/llvm.sh "$LLVM_MAJOR"
          sudo apt-get update
          PKG="clang-format-${LLVM_MAJOR}"
          APT_VERSION=$(apt-cache madison "$PKG" | awk -v want="$CLANG_FORMAT_VERSION" 'index($3, want) {print $3; exit}')
          if [[ -z "$APT_VERSION" ]]; then
            echo "::error::No $PKG package matching $CLANG_FORMAT_VERSION found in APT repositories"
            apt-cache madison "$PKG" || true
            exit 1
          fi
          sudo apt-get install -y "${PKG}=${APT_VERSION}"
          CF_BIN="/usr/bin/${PKG}"
          echo "CF_BIN=$CF_BIN" >> "$GITHUB_ENV"
          VERSION_OUTPUT=$("$CF_BIN" --version)
          echo "$VERSION_OUTPUT"
          if [[ "$VERSION_OUTPUT" != *"version ${CLANG_FORMAT_VERSION}"* ]]; then
            echo "::error::Expected clang-format $CLANG_FORMAT_VERSION, got: $VERSION_OUTPUT"
            exit 1
          fi
          # Show any conflicting shims on PATH for debugging
          type -a clang-format || true

      - name: Determine diff base
        id: base
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            MB=$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")
          else
            MB=$(git rev-parse HEAD~1)
          fi
          echo "mb=$MB" >> "$GITHUB_OUTPUT"

      - name: Run clang-format on changed files
        shell: bash
        run: |
          MB="${{ steps.base.outputs.mb }}"
          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMRT "$MB"...HEAD \
            | grep -E '\.(c|cc|cpp|cxx|h|hh|hpp|hxx|m|mm)$' || true)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No C/C++ files changed."
            exit 0
          fi

          : "${CF_BIN:?CF_BIN not set}"
          "$CF_BIN" --version

          FAIL=0
          for f in "${FILES[@]}"; do
            "$CF_BIN" --dry-run -Werror -style=file "$f" || FAIL=1
          done

          if [[ $FAIL -ne 0 ]]; then
            echo "::error::Some files are not formatted. Run: clang-format -i -style=file <file>..."
            echo "Changed files checked:"
            printf '%s\n' "${FILES[@]}"
            exit 1
          fi
