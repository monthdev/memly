name: Check Doxygen

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  doxygen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Doxygen
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y doxygen graphviz
          doxygen --version
          dot -V

      - name: Build Doxygen
        shell: bash
        run: |
          set -euo pipefail
          doxygen Doxyfile
