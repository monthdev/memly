name: Check Clang Tidy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:25.10
    defaults:
      run:
        shell: bash
    env:
      CMAKE_BUILD_TYPE: Debug
      CC: clang
      CXX: clang++
      QT_VERSION: "6.11.1"
      QT_ARCH: "linux_gcc_64"
      QT_DIR: ${{ github.workspace }}/Qt

    steps:
      - name: Install toolchain
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            clang clang-tidy cmake ninja-build \
            python3 python3-venv \
            libglib2.0-0t64 \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libgtest-dev \
            git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark workspace safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache Qt
        uses: actions/cache@v5
        with:
          path: ${{ env.QT_DIR }}
          key: ${{ runner.os }}-qt-${{ env.QT_VERSION }}-${{ env.QT_ARCH }}

      - name: Install aqtinstall
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "aqtinstall==3.3.*"
          python -m aqt version

      - name: Install Qt ${{ env.QT_VERSION }}
        run: |
          if [[ ! -d "${QT_DIR}/${QT_VERSION}/gcc_64" ]]; then
            . .venv/bin/activate
            python -m aqt install-qt linux desktop "${QT_VERSION}" "${QT_ARCH}" \
              --outputdir "${QT_DIR}"
          fi

      - name: Detect changed source files
        id: changed
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin "${GITHUB_BASE_REF}" --depth=1
            MergeBase="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          else
            MergeBase="${GITHUB_EVENT_BEFORE:-}"
            if [[ -z "$MergeBase" || "$MergeBase" == "0000000000000000000000000000000000000000" ]]; then
              MergeBase="$(git rev-parse HEAD~1)"
            fi
          fi

          mapfile -t ChangedHeaders < <(
            git diff --name-only --diff-filter=ACMR "$MergeBase" HEAD -- \
              '*.hpp' '*.h' '*.hh' '*.hxx' \
            | while read -r File; do
                [[ -f "$File" ]] && printf '%s\n' "$File"
              done
          )

          mapfile -t Files < <(
            git diff --name-only --diff-filter=ACMR "$MergeBase" HEAD -- \
              '*.cpp' '*.cc' '*.cxx' \
            | while read -r File; do
                [[ -f "$File" ]] && printf '%s\n' "$File"
              done
          )

          if [[ ${#Files[@]} -eq 0 && ${#ChangedHeaders[@]} -gt 0 ]]; then
            mapfile -t Files < <(find src test -type f \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) | sort)
          fi

          if [[ ${#Files[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${Files[@]}" > changed-cpp-files.txt
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Configure (CMake + Ninja, generate compile_commands.json)
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
            -DCMAKE_PREFIX_PATH="${QT_DIR}/${QT_VERSION}/gcc_64" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          mapfile -t Files < changed-cpp-files.txt

          if [[ ${#Files[@]} -eq 0 ]]; then
            echo "No source files to lint."
            exit 0
          fi

          clang-tidy \
            -p build \
            -header-filter='^.*/(src|test)/.*' \
            "${Files[@]}"
