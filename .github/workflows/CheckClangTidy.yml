name: Check Clang Tidy

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    clang-tidy:
        runs-on: ubuntu-latest
        container:
            image: ubuntu:24.04
        defaults:
            run:
                shell: bash
        env:
            CMAKE_BUILD_TYPE: Debug
            CC: clang
            CXX: clang++
            QT_ROOT: /opt/qt
            QT_VERSION: 6.9.3

        steps:
            - name: Install bootstrap tools
              run: |
                  set -euo pipefail
                  apt-get update
                  DEBIAN_FRONTEND=noninteractive apt-get install -y \
                    git \
                    ca-certificates \
                    python3 \
                    python3-pip

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  set-safe-directory: true

            - name: Mark workspace as safe for Git
              run: |
                  set -euo pipefail
                  git config --global --add safe.directory "$GITHUB_WORKSPACE"
                  git config --global --get-all safe.directory

            - name: Determine diff base
              id: base
              run: |
                  set -euo pipefail

                  if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
                    git fetch origin "${GITHUB_BASE_REF}" --depth=1
                    MB="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
                  else
                    MB="${GITHUB_EVENT_BEFORE:-}"
                    if [[ -z "$MB" || "$MB" == "0000000000000000000000000000000000000000" ]]; then
                      MB="$(git rev-parse HEAD~1)"
                    fi
                  fi

                  echo "mb=$MB" >> "$GITHUB_OUTPUT"

            - name: Collect changed C++ files
              id: files
              run: |
                  set -euo pipefail

                  MB="${{ steps.base.outputs.mb }}"

                  mapfile -t ChangedSources < <(
                    git diff --name-only --diff-filter=ACMRT "$MB"...HEAD \
                    | grep -E '\.(cpp|cxx|cc)$' || true
                  )

                  mapfile -t ChangedHeaders < <(
                    git diff --name-only --diff-filter=ACMRT "$MB"...HEAD \
                    | grep -E '\.(h|hh|hpp|hxx)$' || true
                  )

                  if [[ ${#ChangedSources[@]} -eq 0 && ${#ChangedHeaders[@]} -eq 0 ]]; then
                    echo "No changed C++ source or header files."
                    echo "has_files=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  : > /tmp/changed_sources.txt
                  : > /tmp/changed_headers.txt

                  if [[ ${#ChangedSources[@]} -gt 0 ]]; then
                    printf '%s\n' "${ChangedSources[@]}" > /tmp/changed_sources.txt
                  fi

                  if [[ ${#ChangedHeaders[@]} -gt 0 ]]; then
                    printf '%s\n' "${ChangedHeaders[@]}" > /tmp/changed_headers.txt
                  fi

                  echo "source_count=${#ChangedSources[@]}" >> "$GITHUB_OUTPUT"
                  echo "header_count=${#ChangedHeaders[@]}" >> "$GITHUB_OUTPUT"
                  echo "has_files=true" >> "$GITHUB_OUTPUT"

                  echo "Changed sources:"
                  cat /tmp/changed_sources.txt || true
                  echo "Changed headers:"
                  cat /tmp/changed_headers.txt || true

            - name: Install toolchain
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail
                  apt-get update
                  DEBIAN_FRONTEND=noninteractive apt-get install -y \
                    build-essential \
                    clang \
                    clang-tidy \
                    cmake \
                    ninja-build \
                    pkg-config \
                    libgl1-mesa-dev \
                    libxkbcommon-dev \
                    libfontconfig1-dev

            - name: Install aqtinstall
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail
                  python3 -m pip install --break-system-packages --upgrade pip
                  python3 -m pip install --break-system-packages aqtinstall

            - name: Install Qt 6.9.3
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail

                  mkdir -p "${QT_ROOT}"

                  python3 -m aqt install-qt \
                    --outputdir "${QT_ROOT}" \
                    linux desktop "${QT_VERSION}" linux_gcc_64

                  echo "${QT_ROOT}/${QT_VERSION}/gcc_64/bin" >> "$GITHUB_PATH"
                  echo "CMAKE_PREFIX_PATH=${QT_ROOT}/${QT_VERSION}/gcc_64/lib/cmake" >> "$GITHUB_ENV"
                  echo "Qt6_DIR=${QT_ROOT}/${QT_VERSION}/gcc_64/lib/cmake/Qt6" >> "$GITHUB_ENV"
                  echo "QT_PLUGIN_PATH=${QT_ROOT}/${QT_VERSION}/gcc_64/plugins" >> "$GITHUB_ENV"
                  echo "QML2_IMPORT_PATH=${QT_ROOT}/${QT_VERSION}/gcc_64/qml" >> "$GITHUB_ENV"

            - name: Show tool versions
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail
                  clang --version
                  clang-tidy --version
                  cmake --version
                  qmake --version || true
                  qtpaths --qt-version || true

            - name: Configure
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail

                  cmake -S . -B build \
                    -G Ninja \
                    -DCMAKE_BUILD_TYPE="${CMAKE_BUILD_TYPE}" \
                    -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
                    -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
                    -DQt6_DIR="${Qt6_DIR}"

            - name: Select clang-tidy targets
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail

                  SourceCount="${{ steps.files.outputs.source_count }}"
                  HeaderCount="${{ steps.files.outputs.header_count }}"

                  if [[ "$SourceCount" -gt 0 ]]; then
                    cp /tmp/changed_sources.txt /tmp/clang_tidy_targets.txt
                    echo "Using changed source files as clang-tidy targets."
                  elif [[ "$HeaderCount" -gt 0 ]]; then
                    find . \
                      -path ./build -prune -o \
                      \( -name '*.cpp' -o -name '*.cxx' -o -name '*.cc' \) \
                      -print \
                      | sort > /tmp/clang_tidy_targets.txt
                    echo "Header-only edit detected; using all translation units as clang-tidy targets."
                  fi

                  echo "clang-tidy targets:"
                  cat /tmp/clang_tidy_targets.txt

            - name: Run clang-tidy
              if: steps.files.outputs.has_files == 'true'
              run: |
                  set -euo pipefail

                  mapfile -t Files < /tmp/clang_tidy_targets.txt

                  if [[ ${#Files[@]} -eq 0 ]]; then
                    echo "No clang-tidy targets selected."
                    exit 0
                  fi

                  clang-tidy \
                    -p build \
                    --header-filter='.*' \
                    "${Files[@]}"
