name: Check Clang Tidy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  clang-tidy:
    runs-on: ubuntu-latest

    # Newer Ubuntu userspace (Qt from apt will be newer than 24.04’s Qt 6.4.x)
    # GitHub Actions supports job containers.  [oai_citation:4‡GitHub Docs](https://docs.github.com/actions/using-jobs/running-jobs-in-a-container?utm_source=chatgpt.com)
    container:
      image: ubuntu:25.04

    env:
      CMAKE_BUILD_TYPE: Debug

    steps:
      - name: Install toolchain and Qt
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            clang clang-tidy cmake ninja-build \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            qt6-base-dev-tools qt6-qmltooling-plugins \
            libgl1-mesa-dev \
            libgtest-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (CMake, generate compile_commands.json)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # Workflow improvement: actually build first.
      # This catches missing headers/libs and guarantees compile_commands.json matches reality.
      - name: Build
        run: |
          cmake --build build

      - name: Run clang-tidy
        run: |
          mapfile -t Files < <(find . -path ./build -prune -o -name '*.cpp' -print)

          if [ ${#Files[@]} -eq 0 ]; then
            echo "No .cpp files found."
            exit 0
          fi

          clang-tidy -p build "${Files[@]}"
